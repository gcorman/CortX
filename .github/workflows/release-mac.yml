name: Release macOS App

on:
  workflow_run:
    workflows: ["Build Python Sidecar"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.0)'
        required: true

jobs:
  release-mac:
    name: Build & release macOS DMG
    runs-on: macos-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))

    steps:
      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Download macOS sidecar from release
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Download attempt ${attempt}/5"
            rm -rf sidecar-dl
            mkdir -p sidecar-dl

            if gh release download "${{ steps.tag.outputs.name }}" \
              --pattern cortx-extractor-darwin-arm64.zip \
              --dir sidecar-dl; then
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Failed to download macOS sidecar after 5 attempts."
              exit 1
            fi

            sleep $((attempt * 15))
          done

          test -f sidecar-dl/cortx-extractor-darwin-arm64.zip
          mkdir -p resources/python-sidecar
          unzip sidecar-dl/cortx-extractor-darwin-arm64.zip -d resources/python-sidecar
          chmod +x resources/python-sidecar/cortx-extractor
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GODEBUG: http2client=0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Sync package.json version with tag
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          npm version "${VERSION#v}" --no-git-tag-version

      - name: Cache Electron builder
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Build and package macOS DMG
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: dist/*.dmg
          fail_on_unmatched_files: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
